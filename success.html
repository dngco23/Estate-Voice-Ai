<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome to EstateVoice</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #C9A84C;
    --dark: #0A0A0A;
    --card: #141414;
    --muted: #777;
    --text: #F0EBE0;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'Jost', sans-serif;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 24px;
  }
  .container { max-width: 520px; }
  .icon { font-size: 52px; margin-bottom: 28px; }
  h1 {
    font-family: var(--serif);
    font-size: clamp(36px, 5vw, 56px);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 20px;
  }
  h1 em { font-style: italic; color: var(--gold); }
  p { font-size: 17px; color: var(--muted); line-height: 1.8; margin-bottom: 40px; }
  .btn {
    display: inline-block;
    background: var(--gold);
    color: #0A0A0A;
    padding: 16px 36px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: var(--sans);
    font-weight: 500;
    border-radius: 2px;
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .divider { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 32px; }
</style>
</head>
<body>
<div class="container">
  <div class="icon">✦</div>
  <div class="divider"></div>
  <h1>You're in.<br /><em>Welcome aboard.</em></h1>
  <p>Your EstateVoice subscription is active. You can now generate unlimited captions and bios for your listings.</p>
  <a href="/" class="btn">Go to EstateVoice</a>
</div>
</body>
</html>
